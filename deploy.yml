name: Build and Deploy Spring Boot

on:
  push:
    branches: [ "main" ] # Triggers whenever you push to main
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull the code from your repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Set up the Java JDK environment
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin' # Highly stable, open-source JDK distribution
        cache: 'maven'          # Automatically caches dependencies to speed up future builds

    # 3. Build the application and run unit tests
    - name: Build with Maven
      run: ./mvnw clean package

    # 4. (Optional) Upload the compiled JAR as an artifact 
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: springboot-app
        path: target/*.jar