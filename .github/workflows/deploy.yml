name: Java CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # PHASE 1: BUILD THE JAR FILE
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Upload the JAR so the next job can download and use it
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app-jar
          path: target/*.jar

  # PHASE 2: DEPLOY (This will wait for your manual click)
  deploy:
    runs-on: ubuntu-latest
    needs: build             # Prevents deployment if the build fails
    environment: production  # <--- THIS triggers the manual "Approve" button!
    
    steps:
      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app-jar
          path: target

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: '3.25.255.105' # Replace with your EC2 IP
          username: 'ubuntu' # Replace with your EC2 Username
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "~/app"
          strip_components: 1

      - name: Run Application on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: '3.25.255.105' # Replace with your EC2 IP
          username: 'ubuntu' # Replace with your EC2 Username
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            # 1. Stop any old app running on the port
            kill $(pgrep -f 'java -jar') || true
            
            # 2. Kill any old screen session named "java-app"
            screen -XS java-app quit || true
            
            # 3. Start a new background screen session running your jar with redirected outputs
            screen -d -m -S java-app bash -c "java -jar ~/app/*.jar > ~/app/app.log 2>&1"